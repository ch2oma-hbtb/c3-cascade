; =============================================================================
; C3-Cascade — Wireless Split Keyboard Firmware
; PlatformIO Build Configuration
; =============================================================================

[platformio]
default_envs = xiao_esp32c3
src_dir = src
include_dir = include
lib_dir = lib

; -----------------------------------------------------------------------------
; Shared settings
; -----------------------------------------------------------------------------
[common]
framework = arduino
monitor_speed = 115200
build_flags =
    -Wall
    -Wextra
    -Wno-unused-parameter
    -DCORE_DEBUG_LEVEL=3

; =============================================================================
; ESP32-C3 — Seeed Studio XIAO ESP32C3
; =============================================================================
[env:xiao_esp32c3]
platform = espressif32
board = seeed_xiao_esp32c3
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
build_flags =
    ${common.build_flags}
    -DBOARD_XIAO_ESP32C3
    -DSPLIT_ROLE_MASTER
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.0
upload_speed = 460800

; ESP32-C3 slave variant (for a second C3 as the right half)
[env:xiao_esp32c3_slave]
platform = espressif32
board = seeed_xiao_esp32c3
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
build_flags =
    ${common.build_flags}
    -DBOARD_XIAO_ESP32C3
    -DSPLIT_ROLE_SLAVE
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.0
upload_speed = 460800

; =============================================================================
; ESP32-C6 — Seeed Studio XIAO ESP32C6
; =============================================================================
[env:xiao_esp32c6]
platform = espressif32
board = seeed_xiao_esp32c6
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
build_flags =
    ${common.build_flags}
    -DBOARD_XIAO_ESP32C6
    -DSPLIT_ROLE_MASTER
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.0
upload_speed = 460800

; =============================================================================
; nRF52840 — Adafruit Feather nRF52840 (skeleton)
; =============================================================================
[env:nrf52840]
platform = nordicnrf52
board = adafruit_feather_nrf52840
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
build_flags =
    ${common.build_flags}
    -DBOARD_NRF52840
    -DSPLIT_ROLE_MASTER
lib_deps =
    ; Adafruit nRF52 BLE libraries are bundled with the platform

; =============================================================================
; Raspberry Pi Pico 2W (RP2350) — Master
; =============================================================================
[env:pico2w]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2w
framework = ${common.framework}
board_build.core = earlephilhower
monitor_speed = ${common.monitor_speed}
build_flags =
    ${common.build_flags}
    -DBOARD_PICO2_W
    -DSPLIT_ROLE_MASTER
lib_deps =
    ; arduino-pico core includes WiFi and BTstack — no external libs needed

; =============================================================================
; Raspberry Pi Pico 2W (RP2350) — Slave
; =============================================================================
[env:pico2w_slave]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2w
framework = ${common.framework}
board_build.core = earlephilhower
monitor_speed = ${common.monitor_speed}
build_flags =
    ${common.build_flags}
    -DBOARD_PICO2_W
    -DSPLIT_ROLE_SLAVE
lib_deps =
    ; arduino-pico core includes WiFi and BTstack — no external libs needed

; =============================================================================
; Raspberry Pi Pico W (RP2040) — Master
; =============================================================================
[env:pico_w]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipicow
framework = ${common.framework}
board_build.core = earlephilhower
monitor_speed = ${common.monitor_speed}
build_flags =
    ${common.build_flags}
    -DBOARD_PICO_W
    -DSPLIT_ROLE_MASTER
    -DENABLE_CLASSIC=1
lib_deps =
    ; arduino-pico core includes WiFi and BTstack — no external libs needed
lib_ignore =
    HID_Bluetooth

; =============================================================================
; Raspberry Pi Pico W (RP2040) — Slave
; =============================================================================
[env:pico_w_slave]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipicow
framework = ${common.framework}
board_build.core = earlephilhower
monitor_speed = ${common.monitor_speed}
build_flags =
    ${common.build_flags}
    -DBOARD_PICO_W
    -DSPLIT_ROLE_SLAVE
lib_deps =
    ; arduino-pico core includes WiFi — no external libs needed
lib_ignore =
    HID_Bluetooth
